<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mambo Timer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] } } } }</script>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4 font-mono">

  <h1 class="text-2xl font-bold mb-8 tracking-tight">Mambo Timer</h1>

  <div class="flex items-center gap-4 mb-10">
    <button id="btn-minus" class="px-5 py-4 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-3xl font-bold transition-colors active:scale-95 select-none">&minus;</button>
    <div id="display" class="text-8xl font-bold tabular-nums select-none cursor-pointer">10:00</div>
    <button id="btn-plus" class="px-5 py-4 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-3xl font-bold transition-colors active:scale-95 select-none">+</button>
  </div>

  <div class="w-full max-w-sm space-y-5 text-base">
    <div class="flex items-center justify-between">
      <span class="font-semibold">Mode</span>
      <div class="flex rounded-xl overflow-hidden border border-zinc-600">
        <button id="btn-mode-timer" class="px-5 py-3 text-lg font-semibold transition-colors bg-emerald-600">Timer</button>
        <button id="btn-mode-stopwatch" class="px-5 py-3 text-lg font-semibold transition-colors bg-zinc-800 hover:bg-zinc-700">Stopwatch</button>
      </div>
    </div>
    <div class="relative">
      <div id="timer-controls">
        <div class="mb-2 font-semibold">Duration (min)</div>
        <div id="duration-buttons" class="grid grid-cols-4 gap-2">
          <button data-dur="5" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">5</button>
          <button data-dur="10" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">10</button>
          <button data-dur="15" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">15</button>
          <button data-dur="20" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">20</button>
          <button data-dur="30" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">30</button>
          <button data-dur="45" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">45</button>
          <button data-dur="60" class="dur-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">60</button>
          <input id="cfg-duration-custom" type="number" min="1" max="120" placeholder="..."
            class="py-3 rounded-xl bg-zinc-800 border border-zinc-600 text-lg text-center focus:outline-none focus:border-emerald-500 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none">
        </div>
      </div>
      <div id="stopwatch-controls" class="hidden absolute inset-0 flex items-center justify-center">
        <button id="btn-sw-reset" class="w-full py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">Reset</button>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <span class="font-semibold">Mambo mode</span>
      <select id="cfg-mode"
        class="px-4 py-3 rounded-xl bg-zinc-800 border border-zinc-600 text-lg focus:outline-none focus:border-emerald-500">
        <option value="off">Off</option>
        <option value="uniform">Uniform</option>
        <option value="random" selected>Random</option>
      </select>
    </div>
    <div id="interval-row">
      <div class="mb-2 font-semibold">Interval (sec)</div>
      <div id="interval-buttons" class="grid grid-cols-4 gap-2">
        <button data-int="10" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">10</button>
        <button data-int="30" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">30</button>
        <button data-int="60" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">60</button>
        <button data-int="120" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">120</button>
        <button data-int="240" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">240</button>
        <button data-int="300" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">300</button>
        <button data-int="600" class="int-btn py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 text-lg font-semibold transition-colors active:scale-95">600</button>
        <input id="cfg-interval-custom" type="number" min="10" max="600" placeholder="..."
          class="py-3 rounded-xl bg-zinc-800 border border-zinc-600 text-lg text-center focus:outline-none focus:border-emerald-500 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none">
      </div>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const display = $("display");
const btnMinus = $("btn-minus");
const btnPlus = $("btn-plus");
const btnModeTimer = $("btn-mode-timer");
const btnModeStopwatch = $("btn-mode-stopwatch");
const timerControls = $("timer-controls");
const stopwatchControls = $("stopwatch-controls");
const btnSwReset = $("btn-sw-reset");
const cfgMode = $("cfg-mode");
const cfgDurationCustom = $("cfg-duration-custom");
const cfgIntervalCustom = $("cfg-interval-custom");
const intervalRow = $("interval-row");

const STORAGE_KEY = "mambo-timer-settings";

const audioShort = new Audio("public/mambo.mp3");
const audioLong = new Audio("public/full_mambo.mp3");

let running = false;
let paused = false;
let endTime = 0;
let startTime = 0;
let elapsedAtPause = 0;
let remainingAtPause = 0;
let rafId = null;
let mamboTimeouts = [];
let selectedDuration = 0;
let selectedInterval = 60;
let audioUnlocked = false;
let stopwatchMode = false;

function unlockAudio() {
  if (audioUnlocked) return;
  audioShort.play().then(() => audioShort.pause()).catch(() => {});
  audioLong.play().then(() => audioLong.pause()).catch(() => {});
  audioUnlocked = true;
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s) {
      cfgMode.value = s.mode ?? "random";
      selectedInterval = s.interval ?? 60;
    }
  } catch { /* ignore */ }
  highlightInterval(selectedInterval);
  updateIntervalVisibility();
  startTimer(10);
}

function saveSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    mode: cfgMode.value,
    interval: selectedInterval,
  }));
}

function formatTime(ms) {
  const totalSec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function updateDisplay(ms) {
  display.textContent = formatTime(ms);
}

function updateIntervalVisibility() {
  intervalRow.style.display = cfgMode.value === "off" ? "none" : "";
}

function highlightDuration(val) {
  document.querySelectorAll(".dur-btn").forEach(b => {
    const active = Number(b.dataset.dur) === val;
    b.classList.toggle("bg-emerald-600", active);
    b.classList.toggle("hover:bg-emerald-500", active);
    b.classList.toggle("bg-zinc-700", !active);
    b.classList.toggle("hover:bg-zinc-600", !active);
  });
  if (![5, 10, 15, 20, 30, 45, 60].includes(val)) {
    cfgDurationCustom.value = val;
  } else {
    cfgDurationCustom.value = "";
  }
}

function highlightInterval(val) {
  document.querySelectorAll(".int-btn").forEach(b => {
    const active = Number(b.dataset.int) === val;
    b.classList.toggle("bg-emerald-600", active);
    b.classList.toggle("hover:bg-emerald-500", active);
    b.classList.toggle("bg-zinc-700", !active);
    b.classList.toggle("hover:bg-zinc-600", !active);
  });
  if (![10, 30, 60, 120, 240, 300, 600].includes(val)) {
    cfgIntervalCustom.value = val;
  } else {
    cfgIntervalCustom.value = "";
  }
}

function setModeUI(isStopwatch) {
  stopwatchMode = isStopwatch;
  btnModeTimer.classList.toggle("bg-emerald-600", !isStopwatch);
  btnModeTimer.classList.toggle("bg-zinc-800", isStopwatch);
  btnModeTimer.classList.toggle("hover:bg-zinc-700", isStopwatch);
  btnModeStopwatch.classList.toggle("bg-emerald-600", isStopwatch);
  btnModeStopwatch.classList.toggle("bg-zinc-800", !isStopwatch);
  btnModeStopwatch.classList.toggle("hover:bg-zinc-700", !isStopwatch);
  timerControls.classList.toggle("invisible", isStopwatch);
  stopwatchControls.classList.toggle("hidden", !isStopwatch);
}

// --- Timer mode ---

function tickTimer() {
  if (!running || stopwatchMode) return;
  const left = endTime - Date.now();
  if (left <= 0) {
    updateDisplay(0);
    finish();
    return;
  }
  updateDisplay(left);
  rafId = requestAnimationFrame(tickTimer);
}

function startTimer(durationMin) {
  unlockAudio();
  selectedDuration = durationMin;
  highlightDuration(durationMin);
  saveSettings();
  stopCommon();

  endTime = Date.now() + durationMin * 60 * 1000;
  running = true;
  paused = false;
  scheduleMambos();
  tickTimer();
  startBgTick();
}

function pauseTimer() {
  if (paused) {
    endTime = Date.now() + remainingAtPause;
    running = true;
    paused = false;
    scheduleMambos();
    tickTimer();
    startBgTick();
  } else {
    remainingAtPause = endTime - Date.now();
    running = false;
    paused = true;
    clearMambos();
    if (rafId) cancelAnimationFrame(rafId);
  }
}

function resetTimer() {
  stopCommon();
  paused = false;
  selectedDuration = 0;
  highlightDuration(0);
  updateDisplay(0);
}

function adjustTimer(deltaMin) {
  unlockAudio();
  if (!running) return;
  if (stopwatchMode) {
    // Shift start time back (+) or forward (-) to add/remove elapsed time
    startTime -= deltaMin * 60 * 1000;
    // Don't let elapsed go negative
    if (startTime > Date.now()) startTime = Date.now();
    scheduleMambosStopwatch();
  } else {
    endTime += deltaMin * 60 * 1000;
    if (endTime <= Date.now()) {
      updateDisplay(0);
      finish();
    } else {
      scheduleMambos();
    }
  }
}

// --- Stopwatch mode ---

function tickStopwatch() {
  if (!running || !stopwatchMode) return;
  const elapsed = Date.now() - startTime;
  updateDisplay(elapsed);
  rafId = requestAnimationFrame(tickStopwatch);
}

function startStopwatch() {
  unlockAudio();
  stopCommon();
  startTime = Date.now();
  elapsedAtPause = 0;
  running = true;
  paused = false;
  scheduleMambosStopwatch();
  tickStopwatch();
  startBgTickStopwatch();
}

function pauseStopwatch() {
  if (paused) {
    startTime = Date.now() - elapsedAtPause;
    running = true;
    paused = false;
    scheduleMambosStopwatch();
    tickStopwatch();
    startBgTickStopwatch();
  } else {
    elapsedAtPause = Date.now() - startTime;
    running = false;
    paused = true;
    clearMambos();
    if (rafId) cancelAnimationFrame(rafId);
  }
}

function resetStopwatch() {
  stopCommon();
  elapsedAtPause = 0;
  paused = false;
  updateDisplay(0);
}

// --- Shared ---

function stopCommon() {
  running = false;
  clearMambos();
  if (rafId) cancelAnimationFrame(rafId);
}

function startBgTick() {
  setTimeout(function bg() {
    if (!running || stopwatchMode) return;
    const left = endTime - Date.now();
    if (left <= 0) { updateDisplay(0); finish(); return; }
    updateDisplay(left);
    setTimeout(bg, 1000);
  }, 1000);
}

function startBgTickStopwatch() {
  setTimeout(function bg() {
    if (!running || !stopwatchMode) return;
    updateDisplay(Date.now() - startTime);
    setTimeout(bg, 1000);
  }, 1000);
}

function playMambo() {
  audioShort.currentTime = 0;
  audioShort.play().catch(() => {});
}

function scheduleMambos() {
  clearMambos();
  const mode = cfgMode.value;
  if (mode === "off") return;

  const intervalSec = selectedInterval;
  const totalMs = endTime - Date.now();

  if (mode === "uniform") {
    const intervalMs = intervalSec * 1000;
    let t = intervalMs;
    while (t < totalMs) {
      mamboTimeouts.push(setTimeout(playMambo, t));
      t += intervalMs;
    }
  } else {
    let t = 0;
    while (true) {
      const gap = -intervalSec * 1000 * Math.log(Math.random());
      t += gap;
      if (t >= totalMs) break;
      mamboTimeouts.push(setTimeout(playMambo, t));
    }
  }
}

function scheduleMambosStopwatch() {
  clearMambos();
  const mode = cfgMode.value;
  if (mode === "off") return;

  // Schedule a batch, then re-schedule when batch runs out
  const intervalSec = selectedInterval;
  const batchDuration = 3600 * 1000; // 1 hour batch

  if (mode === "uniform") {
    const intervalMs = intervalSec * 1000;
    let t = intervalMs;
    while (t < batchDuration) {
      mamboTimeouts.push(setTimeout(playMambo, t));
      t += intervalMs;
    }
    mamboTimeouts.push(setTimeout(() => { if (running && stopwatchMode) scheduleMambosStopwatch(); }, batchDuration));
  } else {
    let t = 0;
    while (true) {
      const gap = -intervalSec * 1000 * Math.log(Math.random());
      t += gap;
      if (t >= batchDuration) break;
      mamboTimeouts.push(setTimeout(playMambo, t));
    }
    mamboTimeouts.push(setTimeout(() => { if (running && stopwatchMode) scheduleMambosStopwatch(); }, batchDuration));
  }
}

function clearMambos() {
  mamboTimeouts.forEach(clearTimeout);
  mamboTimeouts = [];
}

function finish() {
  stopCommon();
  audioLong.currentTime = 0;
  audioLong.play().catch(() => {});
}

// --- Event listeners ---

// Display click = pause/unpause
display.addEventListener("click", () => {
  if (stopwatchMode) {
    if (!running && !paused) startStopwatch();
    else pauseStopwatch();
  } else {
    if (running || paused) pauseTimer();
  }
});

// +/- buttons (timer only)
btnMinus.addEventListener("click", () => adjustTimer(-1));
btnPlus.addEventListener("click", () => adjustTimer(1));

// Mode toggle
btnModeTimer.addEventListener("click", () => {
  if (!stopwatchMode) return;
  const elapsedMs = running ? Date.now() - startTime : elapsedAtPause;
  stopCommon();
  setModeUI(false);
  if (elapsedMs > 0) {
    const mins = elapsedMs / 60000;
    selectedDuration = mins;
    highlightDuration(0);
    endTime = Date.now() + elapsedMs;
    running = true;
    paused = false;
    scheduleMambos();
    tickTimer();
    startBgTick();
  } else {
    resetTimer();
  }
});

btnModeStopwatch.addEventListener("click", () => {
  if (stopwatchMode) return;
  const remainMs = running ? endTime - Date.now() : 0;
  stopCommon();
  setModeUI(true);
  if (remainMs > 0) {
    startTime = Date.now() - remainMs;
    elapsedAtPause = 0;
    running = true;
    paused = false;
    scheduleMambosStopwatch();
    tickStopwatch();
    startBgTickStopwatch();
  } else {
    startStopwatch();
  }
});

// Stopwatch reset
btnSwReset.addEventListener("click", resetStopwatch);

// Duration buttons
document.querySelectorAll(".dur-btn").forEach(btn => {
  btn.addEventListener("click", () => startTimer(Number(btn.dataset.dur)));
});

cfgDurationCustom.addEventListener("change", () => {
  const val = Number(cfgDurationCustom.value);
  if (val > 0) startTimer(val);
});

// Interval buttons
document.querySelectorAll(".int-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    unlockAudio();
    selectedInterval = Number(btn.dataset.int);
    highlightInterval(selectedInterval);
    saveSettings();
    if (running) {
      if (stopwatchMode) scheduleMambosStopwatch();
      else scheduleMambos();
    }
  });
});

cfgIntervalCustom.addEventListener("change", () => {
  const val = Number(cfgIntervalCustom.value);
  if (val > 0) {
    unlockAudio();
    selectedInterval = val;
    highlightInterval(val);
    saveSettings();
    if (running) {
      if (stopwatchMode) scheduleMambosStopwatch();
      else scheduleMambos();
    }
  }
});

// Mambo mode change reschedules live
cfgMode.addEventListener("change", () => {
  saveSettings();
  updateIntervalVisibility();
  if (running) {
    if (stopwatchMode) scheduleMambosStopwatch();
    else scheduleMambos();
  }
});

loadSettings();
</script>
</body>
</html>
