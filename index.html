<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A1210">
  <title>Mambo Timer</title>
  <link rel="icon" type="image/png" href="public/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['"ロダンわんぱく Pro EB"', 'Fredoka', 'sans-serif'] },
    colors: {
      mt: {
        blue: '#6B7FBF', 'blue-light': '#8494D0', 'blue-dark': '#4A5587',
        red: '#D4645A', 'red-light': '#E07A71', 'red-dark': '#B5463A',
        brown: '#A0826B', 'brown-light': '#C4A88E', 'brown-dark': '#5C3D2E',
        cream: '#FFF8F0',
        bg: '#1A1210', 'bg-light': '#2A201C',
      },
    },
  } } }</script>
  <style>
    /* Mode toggle */
    .mode-btn { transition: background-color 0.15s, color 0.15s; }
    [data-mode="timer"] .mode-btn-timer,
    [data-mode="stopwatch"] .mode-btn-sw { background: #6B7FBF; color: #1A1210; }
    [data-mode="stopwatch"] .mode-btn-timer,
    [data-mode="timer"] .mode-btn-sw { background: rgba(212,100,90,0.2); color: #D4645A; }
    [data-mode="stopwatch"] .mode-btn-timer:hover,
    [data-mode="timer"] .mode-btn-sw:hover { background: rgba(212,100,90,0.3); }

    /* Panel crossfade */
    .panel { transition: opacity 0.15s ease; }
    [data-mode="timer"] .panel-timer { opacity: 1; pointer-events: auto; }
    [data-mode="timer"] .panel-sw { opacity: 0; pointer-events: none; }
    [data-mode="stopwatch"] .panel-timer { opacity: 0; pointer-events: none; }
    [data-mode="stopwatch"] .panel-sw { opacity: 1; pointer-events: auto; }

    /* Duration buttons */
    .dur-btn { background: rgba(107,127,191,0.2); color: #8494D0; transition: background-color 0.15s, color 0.15s, transform 0.1s; }
    .dur-btn:hover { background: rgba(107,127,191,0.3); }
    .dur-btn[data-active] { background: #6B7FBF; color: #1A1210; }
    .dur-btn[data-active]:hover { background: #8494D0; }

    /* Interval buttons */
    .int-btn { background: rgba(212,100,90,0.2); color: #E07A71; transition: background-color 0.15s, color 0.15s, transform 0.1s; }
    .int-btn:hover { background: rgba(212,100,90,0.3); }
    .int-btn[data-active] { background: #D4645A; color: #1A1210; }
    .int-btn[data-active]:hover { background: #E07A71; }

    /* Fixed-width digits */
    .digit { width: 0.58em; }
  </style>
</head>
<body class="bg-mt-bg text-mt-cream min-h-screen flex flex-col items-center justify-center p-4">

  <h1 class="text-4xl font-bold mb-8 text-mt-blue">Mambo Timer</h1>

  <div class="flex items-center gap-4 mb-10">
    <button id="btn-minus" class="px-5 py-4 rounded-2xl bg-mt-red text-mt-bg text-3xl font-bold transition-all active:scale-90 select-none shadow-md hover:shadow-lg hover:bg-mt-red-light">&minus;</button>
    <div id="display" class="text-8xl font-bold select-none cursor-pointer text-mt-cream flex justify-center">
      <span class="digit inline-block text-center">1</span><span class="digit inline-block text-center">0</span><span class="inline-block text-center w-[0.3em]">:</span><span class="digit inline-block text-center">0</span><span class="digit inline-block text-center">0</span>
    </div>
    <button id="btn-plus" class="px-5 py-4 rounded-2xl bg-mt-red text-mt-bg text-3xl font-bold transition-all active:scale-90 select-none shadow-md hover:shadow-lg hover:bg-mt-red-light">+</button>
  </div>

  <div id="controls" data-mode="timer" class="w-full max-w-sm space-y-6">
    <div class="flex items-center justify-between">
      <span class="text-xl font-semibold text-mt-brown">Mode</span>
      <div class="flex rounded-2xl overflow-hidden shadow-md">
        <button id="btn-mode-timer" class="mode-btn mode-btn-timer px-6 py-3 text-lg font-semibold">Timer</button>
        <button id="btn-mode-stopwatch" class="mode-btn mode-btn-sw px-6 py-3 text-lg font-semibold">Stopwatch</button>
      </div>
    </div>
    <div class="relative">
      <div id="timer-controls" class="panel panel-timer">
        <div class="mb-2 text-xl font-semibold text-mt-brown">Duration (min)</div>
        <div class="grid grid-cols-4 gap-2">
          <button data-dur="5" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">5</button>
          <button data-dur="10" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">10</button>
          <button data-dur="15" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">15</button>
          <button data-dur="20" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">20</button>
          <button data-dur="30" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">30</button>
          <button data-dur="45" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">45</button>
          <button data-dur="60" class="dur-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">60</button>
          <input id="cfg-duration-custom" type="number" min="1" max="120" placeholder="..."
            class="py-3 rounded-2xl bg-[rgba(107,127,191,0.15)] border-2 border-[rgba(107,127,191,0.25)] text-mt-blue text-lg text-center font-semibold focus:outline-none focus:border-mt-blue [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none">
        </div>
      </div>
      <div id="stopwatch-controls" class="panel panel-sw absolute inset-0 flex items-center justify-center">
        <button id="btn-sw-reset" class="w-full py-3 rounded-2xl bg-mt-red hover:bg-mt-red-light text-mt-bg text-lg font-semibold transition-all active:scale-90 shadow-md">Reset</button>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xl font-semibold text-mt-brown">Mambo mode</span>
      <select id="cfg-mode"
        class="px-4 py-3 rounded-2xl bg-[rgba(212,100,90,0.2)] border-2 border-[rgba(212,100,90,0.25)] text-mt-red text-lg font-semibold focus:outline-none focus:border-mt-red">
        <option value="off">Off</option>
        <option value="uniform">Uniform</option>
        <option value="random" selected>Random</option>
      </select>
    </div>
    <div id="interval-row">
      <div class="mb-2 text-xl font-semibold text-mt-brown">Interval (sec)</div>
      <div class="grid grid-cols-4 gap-2">
        <button data-int="10" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">10</button>
        <button data-int="30" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">30</button>
        <button data-int="60" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">60</button>
        <button data-int="120" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">120</button>
        <button data-int="240" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">240</button>
        <button data-int="300" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">300</button>
        <button data-int="600" class="int-btn py-3 rounded-2xl text-lg font-semibold active:scale-90 shadow-md">600</button>
        <input id="cfg-interval-custom" type="number" min="10" max="600" placeholder="..."
          class="py-3 rounded-2xl bg-[rgba(212,100,90,0.15)] border-2 border-[rgba(212,100,90,0.25)] text-mt-red text-lg text-center font-semibold focus:outline-none focus:border-mt-red [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none">
      </div>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const display = $("display");
const controls = $("controls");
const btnMinus = $("btn-minus");
const btnPlus = $("btn-plus");
const btnModeTimer = $("btn-mode-timer");
const btnModeStopwatch = $("btn-mode-stopwatch");
const btnSwReset = $("btn-sw-reset");
const cfgMode = $("cfg-mode");
const cfgDurationCustom = $("cfg-duration-custom");
const cfgIntervalCustom = $("cfg-interval-custom");
const intervalRow = $("interval-row");

const STORAGE_KEY = "mambo-timer-settings";

const audioShort = new Audio("public/mambo.mp3");
const audioLong = new Audio("public/full_mambo.mp3");

let running = false;
let paused = false;
let endTime = 0;
let startTime = 0;
let elapsedAtPause = 0;
let remainingAtPause = 0;
let rafId = null;
let mamboTimeouts = [];
let selectedDuration = 0;
let selectedInterval = 60;
let audioUnlocked = false;
let stopwatchMode = false;
let wakeLock = null;

// --- Wake Lock ---

async function requestWakeLock() {
  if (!("wakeLock" in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request("screen"); }
  catch { /* user denied or not supported */ }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && running) requestWakeLock();
});

// --- Audio ---

function unlockAudio() {
  if (audioUnlocked) return;
  audioShort.play().then(() => audioShort.pause()).catch(() => {});
  audioLong.play().then(() => audioLong.pause()).catch(() => {});
  audioUnlocked = true;
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s) {
      cfgMode.value = s.mode ?? "random";
      selectedInterval = s.interval ?? 60;
    }
  } catch { /* ignore */ }
  highlightInterval(selectedInterval);
  updateIntervalVisibility();
  startTimer(10);
}

function saveSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    mode: cfgMode.value,
    interval: selectedInterval,
  }));
}

function formatTime(ms) {
  const totalSec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

const digitSpans = display.querySelectorAll(".digit");

function updateDisplay(ms) {
  const str = formatTime(ms);
  digitSpans[0].textContent = str[0];
  digitSpans[1].textContent = str[1];
  digitSpans[2].textContent = str[3];
  digitSpans[3].textContent = str[4];
}

function updateIntervalVisibility() {
  intervalRow.style.display = cfgMode.value === "off" ? "none" : "";
}

function highlightDuration(val) {
  document.querySelectorAll(".dur-btn").forEach(b => {
    if (Number(b.dataset.dur) === val) b.setAttribute("data-active", "");
    else b.removeAttribute("data-active");
  });
  if (![5, 10, 15, 20, 30, 45, 60].includes(val)) {
    cfgDurationCustom.value = val;
  } else {
    cfgDurationCustom.value = "";
  }
}

function highlightInterval(val) {
  document.querySelectorAll(".int-btn").forEach(b => {
    if (Number(b.dataset.int) === val) b.setAttribute("data-active", "");
    else b.removeAttribute("data-active");
  });
  if (![10, 30, 60, 120, 240, 300, 600].includes(val)) {
    cfgIntervalCustom.value = val;
  } else {
    cfgIntervalCustom.value = "";
  }
}

function setModeUI(isStopwatch) {
  stopwatchMode = isStopwatch;
  controls.dataset.mode = isStopwatch ? "stopwatch" : "timer";
}

// --- Timer mode ---

function tickTimer() {
  if (!running || stopwatchMode) return;
  const left = endTime - Date.now();
  if (left <= 0) {
    updateDisplay(0);
    finish();
    return;
  }
  updateDisplay(left);
  rafId = requestAnimationFrame(tickTimer);
}

function startTimer(durationMin) {
  unlockAudio();
  selectedDuration = durationMin;
  highlightDuration(durationMin);
  saveSettings();
  stopCommon();

  endTime = Date.now() + durationMin * 60 * 1000;
  running = true;
  paused = false;
  requestWakeLock();
  scheduleMambos();
  tickTimer();
  startBgTick();
}

function pauseTimer() {
  if (paused) {
    endTime = Date.now() + remainingAtPause;
    running = true;
    paused = false;
    requestWakeLock();
    scheduleMambos();
    tickTimer();
    startBgTick();
  } else {
    remainingAtPause = endTime - Date.now();
    running = false;
    paused = true;
    releaseWakeLock();
    clearMambos();
    if (rafId) cancelAnimationFrame(rafId);
  }
}

function resetTimer() {
  stopCommon();
  releaseWakeLock();
  paused = false;
  selectedDuration = 0;
  highlightDuration(0);
  updateDisplay(0);
}

function adjustTimer(deltaMin) {
  unlockAudio();
  if (!running) return;
  if (stopwatchMode) {
    startTime -= deltaMin * 60 * 1000;
    if (startTime > Date.now()) startTime = Date.now();
    scheduleMambosStopwatch();
  } else {
    endTime += deltaMin * 60 * 1000;
    if (endTime <= Date.now()) {
      updateDisplay(0);
      finish();
    } else {
      scheduleMambos();
    }
  }
}

// --- Stopwatch mode ---

function tickStopwatch() {
  if (!running || !stopwatchMode) return;
  const elapsed = Date.now() - startTime;
  updateDisplay(elapsed);
  rafId = requestAnimationFrame(tickStopwatch);
}

function startStopwatch() {
  unlockAudio();
  stopCommon();
  startTime = Date.now();
  elapsedAtPause = 0;
  running = true;
  paused = false;
  requestWakeLock();
  scheduleMambosStopwatch();
  tickStopwatch();
  startBgTickStopwatch();
}

function pauseStopwatch() {
  if (paused) {
    startTime = Date.now() - elapsedAtPause;
    running = true;
    paused = false;
    requestWakeLock();
    scheduleMambosStopwatch();
    tickStopwatch();
    startBgTickStopwatch();
  } else {
    elapsedAtPause = Date.now() - startTime;
    running = false;
    paused = true;
    releaseWakeLock();
    clearMambos();
    if (rafId) cancelAnimationFrame(rafId);
  }
}

function resetStopwatch() {
  stopCommon();
  releaseWakeLock();
  elapsedAtPause = 0;
  paused = false;
  updateDisplay(0);
}

// --- Shared ---

function stopCommon() {
  running = false;
  clearMambos();
  if (rafId) cancelAnimationFrame(rafId);
}

function startBgTick() {
  setTimeout(function bg() {
    if (!running || stopwatchMode) return;
    const left = endTime - Date.now();
    if (left <= 0) { updateDisplay(0); finish(); return; }
    updateDisplay(left);
    setTimeout(bg, 1000);
  }, 1000);
}

function startBgTickStopwatch() {
  setTimeout(function bg() {
    if (!running || !stopwatchMode) return;
    updateDisplay(Date.now() - startTime);
    setTimeout(bg, 1000);
  }, 1000);
}

function playMambo() {
  audioShort.currentTime = 0;
  audioShort.play().catch(() => {});
}

function scheduleMambos() {
  clearMambos();
  const mode = cfgMode.value;
  if (mode === "off") return;

  const intervalSec = selectedInterval;
  const totalMs = endTime - Date.now();

  if (mode === "uniform") {
    const intervalMs = intervalSec * 1000;
    let t = intervalMs;
    while (t < totalMs) {
      mamboTimeouts.push(setTimeout(playMambo, t));
      t += intervalMs;
    }
  } else {
    let t = 0;
    while (true) {
      const gap = -intervalSec * 1000 * Math.log(Math.random());
      t += gap;
      if (t >= totalMs) break;
      mamboTimeouts.push(setTimeout(playMambo, t));
    }
  }
}

function scheduleMambosStopwatch() {
  clearMambos();
  const mode = cfgMode.value;
  if (mode === "off") return;

  const intervalSec = selectedInterval;
  const batchDuration = 3600 * 1000;

  if (mode === "uniform") {
    const intervalMs = intervalSec * 1000;
    let t = intervalMs;
    while (t < batchDuration) {
      mamboTimeouts.push(setTimeout(playMambo, t));
      t += intervalMs;
    }
    mamboTimeouts.push(setTimeout(() => { if (running && stopwatchMode) scheduleMambosStopwatch(); }, batchDuration));
  } else {
    let t = 0;
    while (true) {
      const gap = -intervalSec * 1000 * Math.log(Math.random());
      t += gap;
      if (t >= batchDuration) break;
      mamboTimeouts.push(setTimeout(playMambo, t));
    }
    mamboTimeouts.push(setTimeout(() => { if (running && stopwatchMode) scheduleMambosStopwatch(); }, batchDuration));
  }
}

function clearMambos() {
  mamboTimeouts.forEach(clearTimeout);
  mamboTimeouts = [];
}

function finish() {
  stopCommon();
  releaseWakeLock();
  audioLong.currentTime = 0;
  audioLong.play().catch(() => {});
}

// --- Event listeners ---

display.addEventListener("click", () => {
  if (stopwatchMode) {
    if (!running && !paused) startStopwatch();
    else pauseStopwatch();
  } else {
    if (running || paused) pauseTimer();
  }
});

btnMinus.addEventListener("click", () => adjustTimer(-1));
btnPlus.addEventListener("click", () => adjustTimer(1));

btnModeTimer.addEventListener("click", () => {
  if (!stopwatchMode) return;
  const elapsedMs = running ? Date.now() - startTime : elapsedAtPause;
  stopCommon();
  setModeUI(false);
  if (elapsedMs > 0) {
    selectedDuration = elapsedMs / 60000;
    highlightDuration(0);
    endTime = Date.now() + elapsedMs;
    running = true;
    paused = false;
    requestWakeLock();
    scheduleMambos();
    tickTimer();
    startBgTick();
  } else {
    resetTimer();
  }
});

btnModeStopwatch.addEventListener("click", () => {
  if (stopwatchMode) return;
  const remainMs = running ? endTime - Date.now() : 0;
  stopCommon();
  setModeUI(true);
  if (remainMs > 0) {
    startTime = Date.now() - remainMs;
    elapsedAtPause = 0;
    running = true;
    paused = false;
    requestWakeLock();
    scheduleMambosStopwatch();
    tickStopwatch();
    startBgTickStopwatch();
  } else {
    startStopwatch();
  }
});

btnSwReset.addEventListener("click", resetStopwatch);

document.querySelectorAll(".dur-btn").forEach(btn => {
  btn.addEventListener("click", () => startTimer(Number(btn.dataset.dur)));
});

cfgDurationCustom.addEventListener("change", () => {
  const val = Number(cfgDurationCustom.value);
  if (val > 0) startTimer(val);
});

document.querySelectorAll(".int-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    unlockAudio();
    selectedInterval = Number(btn.dataset.int);
    highlightInterval(selectedInterval);
    saveSettings();
    if (running) {
      if (stopwatchMode) scheduleMambosStopwatch();
      else scheduleMambos();
    }
  });
});

cfgIntervalCustom.addEventListener("change", () => {
  const val = Number(cfgIntervalCustom.value);
  if (val > 0) {
    unlockAudio();
    selectedInterval = val;
    highlightInterval(val);
    saveSettings();
    if (running) {
      if (stopwatchMode) scheduleMambosStopwatch();
      else scheduleMambos();
    }
  }
});

cfgMode.addEventListener("change", () => {
  saveSettings();
  updateIntervalVisibility();
  if (running) {
    if (stopwatchMode) scheduleMambosStopwatch();
    else scheduleMambos();
  }
});

loadSettings();
</script>
</body>
</html>
